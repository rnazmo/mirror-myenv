# Prerequisites:
#     tmux >= 1.9a (maybe!)
#     git  (for tpm)
#     bash (for tpm)
#
# Note:
#     "set"  = "set-option"
#     "setw" = "set-window-option"
#     "bind" = "bind-key"
#
# Ref:
#     https://wiki.archlinux.org/title/Tmux
#     https://www.josean.com/posts/tmux-setup
#
#     https://red-full-moon.com/tmux-2020/
#     https://qiita.com/nojima/items/9bc576c922da3604a72b
#     https://qiita.com/mnishiguchi/items/18ff80c0cb8269ff6dd8
#     http://man.openbsd.org/OpenBSD-current/man1/tmux.1
#     https://kanjuku-tomato.blogspot.com/2014/02/tmux.html
#     https://kanjuku-tomato.blogspot.com/2014/03/tmux.html
#     https://qiita.com/koara-local/items/940ce66e2ecd8e4d8582
#
# TODO:
#     Customize copy mode config
#     Customize clipboard config
#     Support True Color
#         https://github.com/ganyariya/dotfiles/blob/cee57f4349f524b4d73b1fa3394363ea4549312f/dot_config/tmux/tmux.conf#L17
#         https://zenn.dev/shinoyu/scraps/d480218c59cdf2
#         https://www.pandanoir.info/entry/2019/11/02/202146

# ======================================================
# ======== Basic                                       =
# ======================================================

# Configure true colors
set -g default-terminal "screen-256color"
# set -g terminal-overrides 'xterm:colors=256'

# Escキーの遅延を解消 for vim
# Ref:
#     https://honmushi.com/2020/10/23/tmux-vim-escape/
set -s escape-time 0

# history size
set -g history-limit 50000

# ======================================================
# ======== Session                                     =
# ======================================================

# TODO (Pending): Renumber session index numbers when closing a session
# NOTE: 一応メモっておくが、この設定はやらなくても良い気がしている
# Ref:
#     https://zenn.dev/shuh/articles/tmux-renumber-sessions
#         "tmux でセッション番号を自動で詰め直す方法"
#     https://github.com/tmux/tmux/issues/937

# ======================================================
# ======== Window                                      =
# ======================================================

# ウィンドウのインデックスを1から始める
set -g base-index 1

# Renumber window index numbers when closing a window
# Ref:
#    https://qiita.com/suin/items/9cf0da1b92a166863076
set -g renumber-windows on

# ======================================================
# ======== Pane                                        =
# ======================================================

# ペインのインデックスを1から始める
setw -g pane-base-index 1

# アクティブなペインのみ白っぽく変更（真っ黒は232）
set -g window-style 'bg=colour234'
set -g window-active-style 'bg=colour232'

# pane number display
set -g display-panes-active-colour colour33 #blue
set -g display-panes-colour colour166 #orange
set -g window-status-current-style 'bg=colour022,fg=colour010'

# ======================================================
# ======== Keybinding                                  =
# ======================================================

# ======== Window management

# Create a new window **in the cwd**
bind c new-window -c "#{pane_current_path}"

# ======== Pane management

# Create new pane horizontally/virtically **in the cwd**
unbind %
unbind '"' # NOTE: don't forget to `'` to avoid syntax error
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# Switch pane without prefix (Shift-<↑↓←→>)
bind -n S-up    select-pane -U
bind -n S-down  select-pane -D
bind -n S-left  select-pane -L
bind -n S-right select-pane -R

# Resize pane by 5 (<prefix> Ctrl-<↑↓←→>)
unbind M-Up
unbind M-Down
unbind M-Left
unbind M-Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5

# Toggle the pane maximize/minimize
unbind z
bind -r m resize-pane -Z

# ======================================================
# ======== Status line                                 =
# ======================================================

# Move status line to top
set -g status-position top

# Status line update interval
set -g status-interval 5

# ======================================================
# ======== Copy mode                                   =
# ======================================================

# Ref:
#  https://qiita.com/gatapon/items/c7cf549ebffe86599be9
# To avoid conflict with IME.
# unbind-key C-Space
# Use vim-like keybind in copy mode.
setw -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection  # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# ======== Clipboard                                   =

# クリップボードとの連携
# for Linux?
# TODO:
# Ref: https://github.com/tmux/tmux/wiki/Clipboard
# for macOS
# TODO:
# for Windows
# TODO:

# ======================================================
# ======== Mouse                                       =
# ======================================================

set -g mouse on

# ======================================================
# ======== Plugins                                     =
# ======================================================

# List of plugins

set -g @plugin "tmux-plugins/tpm"

# theme (including status line settings)
set -g @plugin "nordtheme/tmux"

# ======================================================
# ======== tpm (= Plugin)                              =
# ======================================================

# Automatic tpm installation
#
# Ref:
#     https://github.com/tmux-plugins/tpm/blob/99469c4a9b1ccf77fade25842dc7bafbc8ce9946/docs/automatic_tpm_installation.md
#         "tpm／docs／automatic_tpm_installation.md"
#     https://github.com/tmux-plugins/tpm/blob/99469c4a9b1ccf77fade25842dc7bafbc8ce9946/docs/managing_plugins_via_cmd_line.md
#         "tpm／docs／managing_plugins_via_cmd_line.md"
#
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize tpm
#
# NOTE:
#     **keep this line at the very bottom of tmux.conf**
# Ref:
#     https://github.com/tmux-plugins/tpm/blob/master/README.md#installation
#
run '~/.tmux/plugins/tpm/tpm'

