# Prerequisites:
#     tmux >= 1.9a (maybe!)
#     git  (for tpm)
#     bash (for tpm)
#
# Note:
#     "set"  = "set-option"
#     "setw" = "set-window-option"
#     "bind" = "bind-key"
#
# Ref:
#     https://wiki.archlinux.org/title/Tmux
#     https://man.archlinux.org/man/tmux.1#OPTIONS
#     https://www.josean.com/posts/tmux-setup
#
#     https://red-full-moon.com/tmux-2020/
#     https://qiita.com/nojima/items/9bc576c922da3604a72b
#     https://qiita.com/mnishiguchi/items/18ff80c0cb8269ff6dd8
#     http://man.openbsd.org/OpenBSD-current/man1/tmux.1
#     https://kanjuku-tomato.blogspot.com/2014/02/tmux.html
#     https://kanjuku-tomato.blogspot.com/2014/03/tmux.html
#     https://qiita.com/koara-local/items/940ce66e2ecd8e4d8582
#
# TODO:
#     Customize copy mode config
#     Customize clipboard config
#     Support True Color
#         https://github.com/ganyariya/dotfiles/blob/cee57f4349f524b4d73b1fa3394363ea4549312f/dot_config/tmux/tmux.conf#L17
#         https://zenn.dev/shinoyu/scraps/d480218c59cdf2
#         https://www.pandanoir.info/entry/2019/11/02/202146

# ======================================================
# ======== Basic                                       =
# ======================================================

# Configure true colors
set -g default-terminal "screen-256color"
# set -g terminal-overrides 'xterm:colors=256'

# Escキーの遅延を解消 for vim
# Ref:
#     https://honmushi.com/2020/10/23/tmux-vim-escape/
set -s escape-time 0

# history size
set -g history-limit 50000

# Displays messages for 4 seconds
# (The 2s (default) is too fast to read.)
set -g display-time 4000

# ======================================================
# ======== Pane                                        =
# ======================================================

# Set base index for panes to start from 1 instead of 0
setw -g pane-base-index 1

# ======== decoration

# Set pane staus line position
set -g pane-border-status top

# Set pane border type
set -g pane-border-lines heavy

# Set inactive/active pane border style
set -g pane-border-style        fg=colour240 # gray
set -g pane-active-border-style fg=colour39  # light blue

# Set inactive/active pane style
set -g window-style 'fg=colour247,bg=colour237'
set -g window-active-style 'fg=colour255,bg=black'

# # pane number display
# set -g display-panes-active-colour colour33 #blue
# set -g display-panes-colour colour166 #orange
# set -g window-status-current-style 'bg=colour022,fg=colour010'

# ======================================================
# ======== Window                                      =
# ======================================================

# Set base index for windows to start from 1 instead of 0
set -g base-index 1

# Renumber window index numbers when closing a window
# Ref:
#    https://qiita.com/suin/items/9cf0da1b92a166863076
set -g renumber-windows on

# ======================================================
# ======== Session                                     =
# ======================================================

# TODO (Pending): Renumber session index numbers when closing a session
# NOTE: 一応メモっておくが、この設定はやらなくても良い気がしている
# Ref:
#     https://zenn.dev/shuh/articles/tmux-renumber-sessions
#         "tmux でセッション番号を自動で詰め直す方法"
#     https://github.com/tmux/tmux/issues/937

# ======================================================
# ======== Status line                                 =
# ======================================================

# Move status line to top
set -g status-position top

# Status line update interval
set -g status-interval 5

# ======================================================
# ======== Clipboard                                   =
# ======================================================

# クリップボードとの連携
# for Linux?
# TODO:
# Ref: https://github.com/tmux/tmux/wiki/Clipboard
# for macOS
# TODO:
# for Windows
# TODO:

# ======================================================
# ======== Mouse                                       =
# ======================================================

set -g mouse on

# ======================================================
# ======== Keybinding                                  =
# ======================================================

# NOTE:
#     There are some limitations related to modifier keys.
#     e.g.:
#         You can't use: `C-,`, `C-.`, ...
#         Don't use: `C-[` (= Escape), ...
#     Ref:
#         https://github.com/tmux/tmux/wiki/Modifier-Keys

# ======== reset

# disable some unused keybindings
unbind M-Up
unbind M-Down
unbind M-Left
unbind M-Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right
unbind c
unbind '"'
unbind ,
unbind .
unbind o
unbind n
unbind x
unbind z
unbind t
unbind %
unbind &
unbind $
unbind M-o
unbind C

# ======== prefix

unbind C-b
set -g prefix 'C-\'

# ======== pane

# change focus
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# change focus to next
bind -r w select-pane -t :.+

# display pane numbers
bind a display-panes

# create new horizontally/virtically in the cwd
# Ref: https://english.stackexchange.com/q/293520
bind ";" split-window -h -c "#{pane_current_path}"
bind "\'" split-window -v -c "#{pane_current_path}"

# close
bind q kill-pane

# popup new floating
# Ref:
#     https://tech.visasq.com/introduce-tmux-powerful-features#popup-window-%E3%81%AE%E8%A1%A8%E7%A4%BA
#     https://zenn.dev/a24k/articles/20221027-alacritty-tmux#%E3%83%9D%E3%83%83%E3%83%97%E3%82%A2%E3%83%83%E3%83%97%E3%81%A7%E4%B8%80%E6%99%82%E4%BD%9C%E6%A5%AD%E3%82%92%E5%8A%B9%E7%8E%87%E7%9A%84%E3%81%AB
bind f popup -xC -yC -w95% -h95% -E -d "#{pane_current_path}" '\
  if [ popup = $(tmux display -p -F "#{session_name}") ]; then \
    tmux detach-client ; \
  else \
    tmux attach -c $(tmux display -p -F "#{pane_current_path}") -t popup || tmux new -s popup ; \
  fi \
'

# rename
bind e command-prompt "select-pane -T %%"

# resize
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# toggle maximize
bind -r m resize-pane -Z

# swap current with previous/next
bind -r '[' swap-pane -t -1 -d
bind -r ']' swap-pane -t +1 -d

# sync panes
# Ref: https://qiita.com/waieneiaw/items/22ed18809739c9a69f25#1924%E8%BF%BD%E8%A8%98
bind s setw synchronize-panes \; display "synchronize-panes #{?pane_synchronized,on,off}"

# ======== tab

# change focus
bind -r H previous-window
bind -r L next-window
bind -r C-h previous-window
bind -r C-l next-window

# Create new in the cwd
bind C new-window -c "#{pane_current_path}"

# close
bind Q kill-window

# close other tabs
bind O kill-window -a

# rename
bind E command-prompt "rename-window %%"

# swap current with previous/next
bind -r '{' swap-window -t -1 -d
bind -r '}' swap-window -t +1 -d

# break current to new tab
bind B break-pane

# break current to previous/next tab
bind '(' join-pane -t :-1
bind ')' join-pane -t :+1

# ======== session

# choose from tree
bind M-t choose-tree -w

# close
bind M-q confirm-before -p "Kill session? (y/n)" "kill-session"

# ======== server

# close
bind M-Q confirm-before -p "Kill server? (y/n)" "kill-server"

# ======== copy-mode

# Use vim-like keybind in copy mode
# Ref:
#     https://qiita.com/gatapon/items/c7cf549ebffe86599be9
setw -g mode-keys vi

# enter copy-mode
bind Space copy-mode \; display "copy-mode"

# paste buffer
bind p paste-buffer

# don't exit copy mode after dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# start selecting text with "v"
bind -T copy-mode-vi 'v' send -X begin-selection

# copy text with "y"
bind -T copy-mode-vi 'y' send -X copy-selection

# ======== config

# Reload tmux config file
bind '!' source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ======== plugin (tpm)

# TODO:

# ======================================================
# ======== Plugins                                     =
# ======================================================

# List of plugins

set -g @plugin "tmux-plugins/tpm"

# theme (including status line settings)
set -g @plugin "nordtheme/tmux"

# ======================================================
# ======== Plugin                                      =
# ======================================================

# ======== tpm (plugin manager)

# Initialize
#
# NOTE:
#     keep this line at the very bottom of tmux.conf
# Ref:
#     https://github.com/tmux-plugins/tpm/blob/master/README.md#installation
#
run '${XDG_CONFIG_HOME}/tmux/plugins/tpm/tpm'
