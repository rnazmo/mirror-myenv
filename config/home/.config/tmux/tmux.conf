# ======================================================
# ======== Basic                                       =
# ======================================================

# 256色端末を使用する
set -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm:colors=256'
# Escキーの遅延を解消
set -s escape-time 0

# ======================================================
# ======== Window & pane                               =
# ======================================================

# ウィンドウのインデックスを1から始める
set -g base-index 1
# ペインのインデックスを1から始める
setw -g pane-base-index 1
# アクティブなペインのみ白っぽく変更（真っ黒は232）
set -g window-style 'bg=colour234'
set -g window-active-style 'bg=colour232'

# pane number display
set -g display-panes-active-colour colour33 #blue
set -g display-panes-colour colour166 #orange
set -g window-status-current-style 'bg=colour022,fg=colour010'

# ウィンドウを閉じた時に番号を詰める
if-shell "~/dotfiles/bin/tmux-version-check 1.7" '\
      set -g renumber-windows on; \
      '
# ======================================================
# ======== Keybinding                                  =
# ======================================================

# ======== Window management

# Create a new window **in the cwd**
bind c new-window -c "#{pane_current_path}"

# ======== Pane management

# Create new pane horizontally/virtically **in the cwd**
unbind %
unbind '"' # NOTE: don't forget to `'` to avoid syntax error
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# Switch pane without prefix (Shift-<↑↓←→>)
bind -n S-up    select-pane -U
bind -n S-down  select-pane -D
bind -n S-left  select-pane -L
bind -n S-right select-pane -R

# Resize pane by 5 (<prefix> Ctrl-<↑↓←→>)
unbind M-Up
unbind M-Down
unbind M-Left
unbind M-Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5

# Toggle the pane maximize/minimize
unbind z
bind -r m resize-pane -Z

# ======================================================
# ======== Status line                                 =
# ======================================================

# status line を更新する間隔を1秒にする
set -g status-interval 1

# window-status を中央揃えで配置する
set -g status-justify "centre"
# status line の背景色を指定する。
set -g status-bg "colour238"
# status line の文字色を指定する。
set -g status-fg "colour255"
# status-left の最大の長さを指定する。
set -g status-left-length 10
# status-left のフォーマットを指定する。
set -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"
# window-status のフォーマットを指定する。
setw -g window-status-format " #I: #W "
# カレントウィンドウの window-status のフォーマットを指定する
setw -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"
# status-right の最大の長さを指定する。
set -g status-right-length 120
# status line をトップに表示
set -g status-position top

# メモリの量、音量、時刻、Wi-FiのSSIDと強度を表示
set -g status-right "Vol.#(sh get_volume_tmux) #(sh get_ssid_tmux) FRAM:#(top -l 1 -s 5 | grep PhysMem | cut -d ' ' -f 6)B | %x（%a）%T #[default]"
