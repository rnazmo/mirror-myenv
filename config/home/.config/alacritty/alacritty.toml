import = [
  # NOTE: You can't use `$HOME` here. Use `~` instead.
  #     Ref: https://alacritty.org/config-alacritty.html#s0
  "~/.config/alacritty/theme.local/tokyonight_night.toml"
]

[shell]
program = "/bin/zsh"

[window]
opacity = 0.95

[cursor]
style.shape = "Block"
style.blinking = "On"

[font]
size = 11.0
normal.family = "UDEV Gothic 35NF"
normal.style = "Regular"
bold.family = "UDEV Gothic 35NF"
bold.style = "Bold"
italic.family = "UDEV Gothic 35NF"
italic.style = "Italic"
bold_italic.family = "UDEV Gothic 35NF"
bold_italic.style = "Bold Italic"

